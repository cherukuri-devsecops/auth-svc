name: Build and Deploy

on:
  push:
    branches: [main]

env:
  APP_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/auth-svc

jobs:
  build-auth:
    runs-on: arc-runner-set
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      - id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build app image
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            -f app/Dockerfile \
            -t $APP_IMAGE:${{ steps.meta.outputs.image_tag }} .

      - name: Push app image
        run: docker push $APP_IMAGE:${{ steps.meta.outputs.image_tag }}

  # в”Ђв”Ђ Security scan в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
  security-scan:
    name: Security Scan
    needs: build-auth
    runs-on: arc-runner-set
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  deploy:
    needs: [build-auth]
    runs-on: arc-runner-set
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"

      - name: Helm upgrade
        run: |
          helm upgrade --install auth-app ./helm/auth-app \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-push.outputs.image-tag }} \
            --set image.pullPolicy=Always \
            --set secrets.secretKey=${{ secrets.SECRET_KEY }} \
            --set secrets.googleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
            --set secrets.googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --set secrets.serviceApiKey=${{ secrets.SERVICE_API_KEY }} \
            --set config.googleRedirectUri=${{ vars.GOOGLE_REDIRECT_URI }} \
            --set config.allowedOrigins=${{ vars.ALLOWED_ORIGINS }} \
            --atomic \
            --timeout 5m \
            --wait \
            --history-max 5

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-app \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/python-editor -n python-editor
          kubectl rollout status deployment/ollama -n python-editor

      - name: Smoke test
        run: |
          curl -f http://10.0.0.242/health || exit 1