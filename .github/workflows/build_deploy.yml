  #     - name: Upload results to GitHub Security tab
  #       uses: github/codeql-action/upload-sarif@v3
  #       if: always()
  #       with:
  #         sarif_file: trivy-results.sarif

  deploy:
    needs: [build-auth]
    runs-on: arc-runner-set
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Setup kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"

      - name: Helm upgrade
        run: |
          helm upgrade --install auth-svc ./helm/auth-svc \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.APP_IMAGE }} \
            --set image.tag=${{ needs.build-auth.outputs.image_tag }} \
            --set image.pullPolicy=Always \
            --set secrets.secretKey=${{ secrets.SECRET_KEY }} \
            --set secrets.googleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
            --set secrets.googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --set secrets.serviceApiKey=${{ secrets.SERVICE_API_KEY }} \
            --set config.googleRedirectUri=${{ vars.GOOGLE_REDIRECT_URI }} \
            --set config.allowedOrigins=${{ vars.ALLOWED_ORIGINS }} \
            --set ingress.hosts[0].host=${{ vars.AUTH_HOST }} \
            --rollback-on-failure \
            --timeout 5m \
            --wait \
            --history-max 5

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-svc \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/python-editor -n python-editor
          kubectl rollout status deployment/ollama -n python-editor

      - name: Smoke test
        run: |
          curl -f -H "Host: ${{ vars.AUTH_HOST }}" http://10.0.0.242/auth/health || exit 1