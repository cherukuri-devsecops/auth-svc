name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NAMESPACE: auth

jobs:
  # ── Build & push to GHCR ──────────────────────────────────────────────────
  build-push:
    name: Build & Push
    runs-on: arc-runner-set
    permissions:
      contents: read
      packages: write
      security-events: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security scan ─────────────────────────────────────────────────────────
  security-scan:
    name: Security Scan
    needs: build-push
    runs-on: arc-runner-set
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.build-push.outputs.image-tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  # ── Deploy ────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy
    needs: build-push
    runs-on: arc-runner-set
    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4

      - uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 --decode > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Helm upgrade
        run: |
          helm upgrade --install auth-app ./helm/auth-app \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --set image.repository=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} \
            --set image.tag=${{ needs.build-push.outputs.image-tag }} \
            --set image.pullPolicy=Always \
            --set secrets.secretKey=${{ secrets.SECRET_KEY }} \
            --set secrets.googleClientId=${{ secrets.GOOGLE_CLIENT_ID }} \
            --set secrets.googleClientSecret=${{ secrets.GOOGLE_CLIENT_SECRET }} \
            --set secrets.serviceApiKey=${{ secrets.SERVICE_API_KEY }} \
            --set config.googleRedirectUri=${{ vars.GOOGLE_REDIRECT_URI }} \
            --set config.allowedOrigins=${{ vars.ALLOWED_ORIGINS }} \
            --atomic \
            --timeout 5m \
            --wait \
            --history-max 5

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/auth-app \
            --namespace ${{ env.NAMESPACE }} \
            --timeout=120s
