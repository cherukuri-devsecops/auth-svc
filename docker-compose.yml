services:
  # ── Auth Service ──────────────────────────────────────────────────────────
  auth-app:
    build: .
    container_name: auth-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - auth-net
    volumes:
      - ./app:/app/app   # live-reload in dev — remove in prod

  # ── Redis (token blacklist only) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: auth-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - auth-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:

networks:
  auth-net:
    driver: bridge
